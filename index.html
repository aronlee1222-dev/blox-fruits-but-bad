<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blox Fruits (But Bad) - 3D Update!</title>
    <style>
        body { margin: 0; overflow: hidden; font-family: 'Courier New', Courier, monospace; background-color: #87CEEB;}
        #ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 10;
        }
        .text-overlay {
            position: absolute;
            color: white;
            text-shadow: 2px 2px 0 #000, -1px -1px 0 #000, 1px -1px 0 #000, -1px 1px 0 #000, 1px 1px 0 #000;
            font-weight: bold;
        }
        #ui-top-left {
            position: absolute;
            top: 20px;
            left: 20px;
            color: white;
            font-weight: bold;
            z-index: 100;
        }
        .bar-container {
            width: 300px;
            height: 25px;
            background-color: rgba(0,0,0,0.5);
            border: 2px solid #fff;
            border-radius: 5px;
            margin-bottom: 5px;
            position: relative;
            overflow: hidden;
        }
        .bar-fill {
            height: 100%;
            background-color: #ff5555;
            width: 100%;
            transition: width 0.2s, background-color 0.2s;
        }
        .bar-text {
            position: absolute;
            width: 100%;
            text-align: center;
            top: 2px;
            font-size: 18px;
            text-shadow: 1px 1px 0 #000, -1px -1px 0 #000;
        }
        #beli { font-size: 24px; color: yellow; margin-bottom: 10px; text-shadow: 2px 2px 0 #000; }
        #level-text { font-size: 20px; color: #00ffff; margin-bottom: 5px; text-shadow: 2px 2px 0 #000; }
        #boss-health-container { top: 20px; left: 50%; transform: translateX(-50%); position: absolute; display: none; width: 600px; z-index: 100; }
        #crosshair {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: white;
            font-size: 20px;
            text-shadow: 1px 1px 2px black;
        }
        #messages {
            position: absolute;
            top: 30%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 48px;
            color: yellow;
            text-align: center;
        }
        #stats-menu {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background-color: rgba(0, 0, 0, 0.8);
            border: 2px solid white;
            padding: 20px;
            border-radius: 10px;
            color: white;
            z-index: 200;
            display: none;
            text-align: center;
        }
        .stat-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin: 10px 0;
            font-size: 20px;
            width: 300px;
        }
        .stat-btn {
            background-color: #ffaa00;
            border: none;
            color: black;
            font-weight: bold;
            padding: 5px 10px;
            cursor: pointer;
            border-radius: 5px;
        }
        .stat-btn:hover {
            background-color: #ffcc00;
        }
    </style>
    <!-- Import Three.js -->
    <script type="importmap">
      {
        "imports": {
          "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
          "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
        }
      }
    </script>
</head>
<body>
    <div id="ui-layer">
        <div id="ui-top-left">
            <div id="beli" class="text-overlay" style="position: relative; top: auto; left: auto;">Beli: 0</div>
            <div id="level-text" class="text-overlay" style="position: relative; top: auto; left: auto;">Level: 1</div>
            <div class="bar-container">
                <div id="health-fill" class="bar-fill" style="background-color: #ff5555;"></div>
                <div id="health-text" class="bar-text text-overlay" style="position: relative; top: -23px;">HP: 500/500</div>
            </div>
            <div class="bar-container" style="height: 15px;">
                <div id="exp-fill" class="bar-fill" style="background-color: #00aaff; width: 0%;"></div>
                <div id="exp-text" class="bar-text text-overlay" style="font-size: 12px; position: relative; top: -18px;">EXP: 0/100</div>
            </div>
        </div>
        <div id="boss-health-container">
            <div class="bar-container" style="width: 100%; height: 35px;">
                <div id="boss-health-fill" class="bar-fill" style="background-color: #ff3333;"></div>
                <div id="boss-health-text" class="bar-text text-overlay" style="font-size: 24px; position: relative; top: -33px; width: 100%;">GORILLA KING HP: 5000</div>
            </div>
        </div>
        <div id="crosshair">+</div>
        <div id="messages" class="text-overlay"></div>
        <div id="interaction-prompt" class="text-overlay" style="bottom: 20px; left: 50%; transform: translateX(-50%); font-size: 24px; display: none;"></div>
        <div id="quest-tracker" class="text-overlay" style="top: 20px; right: 20px; font-size: 20px; color: #ffaa00; text-align: right; display: none;">
            <div>QUEST: Defeat Bandits</div>
            <div id="quest-progress">0/5</div>
        </div>
        <div id="stats-menu">
            <h2>STATS</h2>
            <p id="stat-points-text" style="color: yellow;">Unspent Points: 0</p>
            <div class="stat-row"><span>Melee: <span id="stat-melee-val">1</span></span><button class="stat-btn" id="btn-melee">+</button></div>
            <div class="stat-row"><span>Defense: <span id="stat-defense-val">1</span></span><button class="stat-btn" id="btn-defense">+</button></div>
            <div class="stat-row"><span>Blox Fruit: <span id="stat-blox-val">1</span></span><button class="stat-btn" id="btn-blox">+</button></div>
            <p style="font-size: 14px; margin-top: 20px; color: #ccc;">Press [Tab] to close</p>
        </div>
    </div>

    <script type="module">
        import * as THREE from 'three';

        // --- UI Setup ---
        let score = 0;
        let playerHealth = 500;
        let playerMaxHealth = 500;
        let playerLevel = 1;
        let playerExp = 0;
        let playerMaxExp = 100;
        let bossHealth = 5000;
        let bossMaxHealth = 5000;
        
        const beliEl = document.getElementById('beli');
        const levelTextEl = document.getElementById('level-text');
        const healthFillEl = document.getElementById('health-fill');
        const healthTextEl = document.getElementById('health-text');
        const expFillEl = document.getElementById('exp-fill');
        const expTextEl = document.getElementById('exp-text');
        const bossHealthContainer = document.getElementById('boss-health-container');
        const bossHealthFillEl = document.getElementById('boss-health-fill');
        const bossHealthTextEl = document.getElementById('boss-health-text');
        const messagesEl = document.getElementById('messages');

        const promptEl = document.getElementById('interaction-prompt');
        const questTrackerEl = document.getElementById('quest-tracker');
        const questProgressEl = document.getElementById('quest-progress');

        const statsMenu = document.getElementById('stats-menu');
        const statPointsText = document.getElementById('stat-points-text');
        const statMeleeVal = document.getElementById('stat-melee-val');
        const statDefenseVal = document.getElementById('stat-defense-val');
        const statBloxVal = document.getElementById('stat-blox-val');

        let currentQuest = null;
        let questProgress = 0;
        let questTarget = 0;

        let statPoints = 0;
        let statMelee = 1;
        let statDefense = 1;
        let statBlox = 1;

        document.getElementById('btn-melee').addEventListener('click', () => {
            if (statPoints > 0) { statPoints--; statMelee++; updateUI(); }
        });
        document.getElementById('btn-defense').addEventListener('click', () => {
            if (statPoints > 0) { 
                statPoints--; statDefense++; 
                playerMaxHealth = 500 + (statDefense - 1) * 20;
                playerHealth += 20;
                updateUI(); 
            }
        });
        document.getElementById('btn-blox').addEventListener('click', () => {
            if (statPoints > 0) { statPoints--; statBlox++; updateUI(); }
        });

        function updateUI() {
            beliEl.innerText = `Beli: ${score}`;
            levelTextEl.innerText = `Level: ${playerLevel}`;
            
            healthTextEl.innerText = `HP: ${Math.floor(playerHealth)}/${playerMaxHealth}`;
            healthFillEl.style.width = `${Math.max(0, (playerHealth / playerMaxHealth) * 100)}%`;
            
            expTextEl.innerText = `EXP: ${playerExp}/${playerMaxExp}`;
            expFillEl.style.width = `${Math.min(100, (playerExp / playerMaxExp) * 100)}%`;
            
            // Interaction Prompts
            let promptText = "";
            if (typeof questGiver !== 'undefined' && questGiver && player.position.distanceTo(questGiver.position) < 80) {
                promptText = "Press [E] to Talk to Quest Giver";
            } else if (typeof boatDealer !== 'undefined' && boatDealer && player.position.distanceTo(boatDealer.position) < 80) {
                promptText = "Press [B] to buy Boat (500 Beli)";
            } else if (!playerState.mountedBoat) {
                for (let b of (typeof boats !== 'undefined' ? boats : [])) {
                    if (player.position.distanceTo(b.position) < 40) {
                        promptText = "Press [E] to Drive Boat";
                        break;
                    }
                }
            } else if (playerState.mountedBoat) {
                promptText = "Press [E] or [Space] to Dismount";
            }
            
            if (promptText) {
                promptEl.style.display = 'block';
                promptEl.innerText = promptText;
            } else {
                promptEl.style.display = 'none';
            }

            if (bossHealth > 0 && boss) {
                // Only show if close
                if (player.position.distanceTo(boss.position) < 400) {
                    bossHealthContainer.style.display = 'block';
                    bossHealthTextEl.innerText = `GORILLA KING HP: ${Math.floor(bossHealth)}/${bossMaxHealth}`;
                    bossHealthFillEl.style.width = `${Math.max(0, (bossHealth / bossMaxHealth) * 100)}%`;
                } else {
                    bossHealthContainer.style.display = 'none';
                }
            } else {
                bossHealthContainer.style.display = 'none';
            }

            if (currentQuest) {
                questTrackerEl.style.display = 'block';
                questProgressEl.innerText = `${questProgress}/${questTarget}`;
            } else {
                questTrackerEl.style.display = 'none';
            }

            statPointsText.innerText = `Unspent Points: ${statPoints}`;
            statMeleeVal.innerText = statMelee;
            statDefenseVal.innerText = statDefense;
            statBloxVal.innerText = statBlox;
        }

        function showMessage(text, duration = 2000, color = "yellow") {
            messagesEl.innerText = text;
            messagesEl.style.color = color;
            setTimeout(() => {
                if (messagesEl.innerText === text) messagesEl.innerText = '';
            }, duration);
        }

        // --- Scene Setup ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x87CEEB); // Sky blue
        scene.fog = new THREE.Fog(0x87CEEB, 200, 1500);

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 2000);
        
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        // --- Lighting ---
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
        scene.add(ambientLight);
        const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
        dirLight.position.set(100, 200, 50);
        scene.add(dirLight);

        // --- Textures ---
        const textureLoader = new THREE.TextureLoader();
        textureLoader.setPath('sprites/');
        // Helper to load sprite material without blurring
        function loadSpriteMat(name) {
            const map = textureLoader.load(name + '.png');
            map.magFilter = THREE.NearestFilter;
            map.minFilter = THREE.NearestFilter;
            return new THREE.SpriteMaterial({ map: map, color: 0xffffff });
        }

        const mats = {
            player: loadSpriteMat('player_swordsman'),
            bandit: loadSpriteMat('bandit_enemy'),
            boss: loadSpriteMat('bandit_enemy'), // Boss is red later
            desertBandit: loadSpriteMat('bandit_enemy'),
            snowman: loadSpriteMat('bandit_enemy')
        };
        mats.boss.color = new THREE.Color(0xff3333);
        mats.desertBandit.color = new THREE.Color(0xffffaa); // Yellow tint
        mats.snowman.color = new THREE.Color(0xaaffff); // Light blue tint

        // Transformation sprites
        const beasts = ["dragon", "tiger", "kitsune", "yeti", "t-rex", "venom", "gas", "mammoth", "phoenix", "eagle", "ice", "buddha"];
        beasts.forEach(b => {
            mats[b] = loadSpriteMat(b + '_beast');
        });

        // --- World Building ---
        const colliders = [];

        // Starter Island
        const grassGeo = new THREE.BoxGeometry(400, 20, 400);

        // Boat Dealer
        const dealerGeo = new THREE.BoxGeometry(20, 80, 20);
        const dealerMat = new THREE.MeshBasicMaterial({ color: 0x00ffff }); // Glowing cyan
        const boatDealer = new THREE.Mesh(dealerGeo, dealerMat);
        boatDealer.position.set(0, 30, -50); // Right in front of spawn
        scene.add(boatDealer);

        // Quest Giver
        const questMat = new THREE.MeshBasicMaterial({ color: 0xffaa00 }); // Glowing orange
        const questGiver = new THREE.Mesh(dealerGeo, questMat);
        questGiver.position.set(30, 30, -50);
        scene.add(questGiver);

        const boats = [];

        function build3DBeast(type) {
            const group = new THREE.Group();
            const addBox = (w, h, d, color, x, y, z) => {
                const g = new THREE.BoxGeometry(w, h, d);
                const m = new THREE.MeshLambertMaterial({ color: color });
                const b = new THREE.Mesh(g, m);
                b.position.set(x, y, z);
                group.add(b);
                return b;
            };

            switch (type) {
                case 'dragon':
                    addBox(15, 15, 60, 0x00aa00, 0, 10, 0); // Body
                    addBox(20, 20, 20, 0x008800, 0, 15, -35); // Head
                    addBox(5, 5, 20, 0xffff00, 10, 25, -35); // Horn
                    addBox(5, 5, 20, 0xffff00, -10, 25, -35); // Horn
                    break;
                case 'kitsune':
                    addBox(20, 20, 40, 0xffaa00, 0, 10, 0); // Body
                    addBox(15, 15, 15, 0xffaa00, 0, 25, -25); // Head
                    for(let i=0; i<3; i++) {
                        addBox(5, 5, 30, 0xffaa00, -10 + i*10, 10, 30); // 3 Tails
                    }
                    break;
                case 'yeti':
                    addBox(30, 40, 20, 0xffffff, 0, 20, 0); // Body
                    addBox(15, 15, 15, 0xeeeeee, 0, 45, 0); // Head
                    addBox(10, 30, 10, 0xffffff, 20, 20, 0); // Arm
                    addBox(10, 30, 10, 0xffffff, -20, 20, 0); // Arm
                    break;
                case 't-rex':
                    addBox(20, 30, 40, 0x228B22, 0, 15, 0); // Body
                    addBox(15, 15, 25, 0x006400, 0, 35, -20); // Head
                    addBox(5, 10, 5, 0x228B22, 12, 15, -10); // Tiny arm
                    addBox(5, 10, 5, 0x228B22, -12, 15, -10); // Tiny arm
                    addBox(10, 30, 30, 0x228B22, 0, 10, 30); // Tail
                    break;
                case 'tiger':
                    addBox(20, 20, 40, 0xff8800, 0, 10, 0); // Body
                    addBox(15, 15, 15, 0xff8800, 0, 20, -25); // Head
                    addBox(22, 22, 5, 0x000000, 0, 10, -10); // Stripe
                    addBox(22, 22, 5, 0x000000, 0, 10, 10); // Stripe
                    break;
                case 'mammoth':
                    addBox(30, 30, 50, 0x8B4513, 0, 15, 0); // Body
                    addBox(20, 20, 20, 0x8B4513, 0, 25, -30); // Head
                    addBox(5, 5, 30, 0xffffff, 10, 20, -40); // Tusk
                    addBox(5, 5, 30, 0xffffff, -10, 20, -40); // Tusk
                    break;
                case 'phoenix':
                    addBox(15, 15, 20, 0x00ffff, 0, 10, 0); // Body
                    addBox(40, 5, 15, 0x00ffff, 0, 15, 0); // Wings
                    addBox(10, 10, 10, 0xffff00, 0, 20, -15); // Head
                    break;
                case 'eagle':
                    addBox(15, 15, 20, 0x8B4513, 0, 10, 0); // Body
                    addBox(50, 2, 15, 0x8B4513, 0, 15, 0); // Wings
                    addBox(10, 10, 10, 0xffffff, 0, 20, -15); // Head
                    break;
                case 'venom':
                    // 3-Headed Venom Dragon
                    addBox(20, 20, 60, 0x800080, 0, 15, 0); // Body
                    // Main Head
                    addBox(15, 15, 20, 0x4B0082, 0, 25, -35);
                    addBox(4, 4, 15, 0x00ff00, 5, 30, -40); // Horn
                    addBox(4, 4, 15, 0x00ff00, -5, 30, -40); // Horn
                    // Left Head
                    addBox(12, 12, 18, 0x4B0082, 15, 20, -30);
                    addBox(3, 3, 10, 0x00ff00, 15, 25, -35); // Horn
                    // Right Head
                    addBox(12, 12, 18, 0x4B0082, -15, 20, -30);
                    addBox(3, 3, 10, 0x00ff00, -15, 25, -35); // Horn
                    // Wings
                    addBox(40, 5, 20, 0x800080, 0, 25, 0); // Wings
                    break;
                case 'gas': {
                    const matGas = new THREE.MeshLambertMaterial({ color: 0xaaaaaa, transparent: true, opacity: 0.7 });
                    const gGeo = new THREE.SphereGeometry(15);
                    const mesh1 = new THREE.Mesh(gGeo, matGas); mesh1.position.set(0,20,0); group.add(mesh1);
                    const mesh2 = new THREE.Mesh(gGeo, matGas); mesh2.position.set(10,15,10); group.add(mesh2);
                    const mesh3 = new THREE.Mesh(gGeo, matGas); mesh3.position.set(-10,25,-10); group.add(mesh3);
                    break;
                }
                case 'ice':
                    addBox(20, 40, 20, 0x00ffff, 0, 20, 0); // Ice golem body
                    addBox(15, 15, 15, 0xaaffff, 0, 45, 0); // Ice head
                    addBox(10, 30, 10, 0x00ffff, 20, 20, 0); // Ice arm
                    addBox(10, 30, 10, 0x00ffff, -20, 20, 0); // Ice arm
                    break;
                case 'buddha':
                    addBox(50, 60, 40, 0xffd700, 0, 30, 0); // Golden body
                    addBox(30, 30, 30, 0xffd700, 0, 75, 0); // Golden head
                    addBox(20, 50, 20, 0xffd700, 40, 30, 0); // Golden arm
                    addBox(20, 50, 20, 0xffd700, -40, 30, 0); // Golden arm
                    break;
                default:
                    addBox(20, 20, 20, 0xff0000, 0, 10, 0); // Fallback cube
            }
            return group;
        }
        const grassMat = new THREE.MeshLambertMaterial({ color: 0x228B22 });
        const island1 = new THREE.Mesh(grassGeo, grassMat);
        island1.position.set(0, -10, 0);
        scene.add(island1);
        colliders.push(island1);

        // Boss Island
        const stoneGeo = new THREE.BoxGeometry(500, 20, 500);
        const stoneMat = new THREE.MeshLambertMaterial({ color: 0x696969 });
        const island2 = new THREE.Mesh(stoneGeo, stoneMat);
        island2.position.set(1200, -10, 0); // Far on X axis
        scene.add(island2);
        colliders.push(island2);

        // Desert Island
        const sandGeo = new THREE.BoxGeometry(400, 20, 400);
        const sandMat = new THREE.MeshLambertMaterial({ color: 0xF4A460 }); // Sandy brown
        const desertIsland = new THREE.Mesh(sandGeo, sandMat);
        desertIsland.position.set(-800, -10, -800);
        scene.add(desertIsland);
        colliders.push(desertIsland);

        // Snow Island
        const snowGeo = new THREE.BoxGeometry(400, 20, 400);
        const snowMat = new THREE.MeshLambertMaterial({ color: 0xFFFAFA }); // Snow white
        const snowIsland = new THREE.Mesh(snowGeo, snowMat);
        snowIsland.position.set(800, -10, 800);
        scene.add(snowIsland);
        colliders.push(snowIsland);

        // Ocean
        const oceanGeo = new THREE.PlaneGeometry(10000, 10000);
        const oceanMat = new THREE.MeshLambertMaterial({ color: 0x006994, transparent: true, opacity: 0.8 });
        const ocean = new THREE.Mesh(oceanGeo, oceanMat);
        ocean.rotation.x = -Math.PI / 2;
        ocean.position.y = -50;
        scene.add(ocean);

        // --- Player ---
        const player = new THREE.Group();
        player.position.set(0, 10, 0);
        scene.add(player);

        const playerSprite = new THREE.Sprite(mats.player);
        playerSprite.scale.set(15, 15, 1);
        playerSprite.position.y = 8;
        player.add(playerSprite);

        // Camera Pivot (Third Person)
        const cameraPivot = new THREE.Group();
        player.add(cameraPivot);
        camera.position.set(0, 15, 40);
        cameraPivot.add(camera);

        // Player physics/movement state
        const playerState = {
            velocity: new THREE.Vector3(),
            onGround: false,
            speed: 60,
            jumpForce: 100,
            jumpCount: 0,
            maxJumps: 12,
            isDashing: false,
            currentFruit: null,
            fruitColor: new THREE.Color(0xffffff),
            isTransformed: false,
            mountedBoat: null,
            beastModel: null
        };

        function saveProgress() {
            const data = {
                score, playerHealth, playerMaxHealth, playerLevel, playerExp, playerMaxExp,
                statPoints, statMelee, statDefense, statBlox,
                currentFruit: playerState.currentFruit,
                fruitColor: playerState.fruitColor.getHexString()
            };
            localStorage.setItem('bloxFruitsSave', JSON.stringify(data));
        }

        function loadProgress() {
            const saved = localStorage.getItem('bloxFruitsSave');
            if (saved) {
                try {
                    const data = JSON.parse(saved);
                    score = data.score || 0;
                    playerMaxHealth = data.playerMaxHealth || 500;
                    playerHealth = data.playerHealth || playerMaxHealth;
                    playerLevel = data.playerLevel || 1;
                    playerExp = data.playerExp || 0;
                    playerMaxExp = data.playerMaxExp || 100;
                    statPoints = data.statPoints || 0;
                    statMelee = data.statMelee || 1;
                    statDefense = data.statDefense || 1;
                    statBlox = data.statBlox || 1;
                    
                    if (data.currentFruit) {
                        playerState.currentFruit = data.currentFruit;
                        playerState.fruitColor = new THREE.Color('#' + data.fruitColor);
                    }
                } catch (e) {
                    console.error("Failed to load save", e);
                }
            }
        }

        loadProgress();
        updateUI();
        setInterval(saveProgress, 2000); // Auto-save every 2 seconds

        // --- Inputs ---
        const keys = {};
        window.addEventListener('keydown', e => { 
            if (e.key === 'Tab') {
                e.preventDefault();
                statsMenu.style.display = statsMenu.style.display === 'block' ? 'none' : 'block';
                // Exit pointer lock if menu opened
                if (statsMenu.style.display === 'block' && isPointerLocked) {
                    document.exitPointerLock();
                }
            } else {
                keys[e.key.toLowerCase()] = true; 
            }
        });
        window.addEventListener('keyup', e => { if(e.key !== 'Tab') keys[e.key.toLowerCase()] = false; });

        // Dash and Jump
        window.addEventListener('keydown', e => {
            const key = e.key.toLowerCase();
            if (key === ' ') {
                if (playerState.mountedBoat) {
                    playerState.mountedBoat = null; // Dismount
                    playerState.velocity.y = 50; // Jump off
                } else {
                    if (playerState.isTransformed && playerState.currentFruit === 'phoenix') {
                        // Continuous flight for Phoenix
                        playerState.velocity.y = 120; // Upward flap
                        playerState.onGround = false;
                        // Particle effect
                        const fGeo = new THREE.BoxGeometry(2,2,2);
                        const fMat = new THREE.MeshBasicMaterial({ color: 0x00ffff });
                        const fMesh = new THREE.Mesh(fGeo, fMat);
                        fMesh.position.copy(player.position);
                        scene.add(fMesh);
                        setTimeout(() => scene.remove(fMesh), 500);
                    } else {
                        if (playerState.onGround) playerState.jumpCount = 0;
                        if (playerState.jumpCount < playerState.maxJumps) {
                            playerState.velocity.y = playerState.jumpForce;
                            playerState.onGround = false;
                            playerState.jumpCount++;
                        }
                    }
                }
            }
            if (key === 'q' && !playerState.isDashing) {
                playerState.isDashing = true;
                const forward = new THREE.Vector3(0, 0, -1).applyQuaternion(player.quaternion);
                if (playerState.currentFruit === 'light') {
                    playerState.velocity.add(forward.multiplyScalar(800));
                    showMessage("LIGHT FLIGHT!", 1000, "#ffff00");
                } else {
                    playerState.velocity.add(forward.multiplyScalar(200));
                }
                setTimeout(() => playerState.isDashing = false, 300);
            }
            if (key === 'v') {
                const bFruits = ["dragon", "tiger", "kitsune", "yeti", "mammoth", "t-rex", "phoenix", "eagle", "venom", "gas", "ice", "buddha"];
                if (playerState.currentFruit && bFruits.includes(playerState.currentFruit)) {
                    playerState.isTransformed = !playerState.isTransformed;
                    if (playerState.isTransformed) {
                        playerSprite.visible = false;
                        if (playerState.beastModel) {
                            player.remove(playerState.beastModel);
                        }
                        playerState.beastModel = build3DBeast(playerState.currentFruit);
                        player.add(playerState.beastModel);
                        camera.position.set(0, 80, 150); // Zoom out
                        showMessage(playerState.currentFruit.toUpperCase() + " TRANSFORMATION!", 2000, "#" + playerState.fruitColor.getHexString());
                    } else {
                        playerSprite.visible = true;
                        if (playerState.beastModel) {
                            player.remove(playerState.beastModel);
                            playerState.beastModel = null;
                        }
                        camera.position.set(0, 15, 40); // Zoom in
                    }
                }
            }
            
            // Generic attacks
            if (['z','x','c'].includes(key) && playerState.currentFruit) {
                if (playerState.isTransformed && playerState.currentFruit === 'mammoth' && key === 'c') {
                    // Mammoth Stomp
                    if (!playerState.onGround) return;
                    showMessage("MAMMOTH STOMP!", 1000, "#8B4513");
                    // AoE effect visual
                    const stompGeo = new THREE.CylinderGeometry(40, 40, 5, 16);
                    const stompMat = new THREE.MeshBasicMaterial({ color: 0x8B4513, transparent: true, opacity: 0.5 });
                    const stompMesh = new THREE.Mesh(stompGeo, stompMat);
                    stompMesh.position.copy(player.position);
                    stompMesh.position.y -= 5;
                    scene.add(stompMesh);
                    
                    // Fade out the visual
                    setTimeout(() => { scene.remove(stompMesh); }, 300);
                    
                    // Damage calculation
                    const damageMult = 1 + (statBlox - 1) * 0.1;
                    const stompDamage = 400 * damageMult;
                    
                    // Damage enemies
                    for (let j = enemies.length - 1; j >= 0; j--) {
                        const e = enemies[j];
                        if (player.position.distanceTo(e.mesh.position) < 45) {
                            e.hp -= stompDamage;
                            // Knockback
                            const toEnemy = new THREE.Vector3().copy(e.mesh.position).sub(player.position).normalize();
                            e.mesh.position.addScaledVector(toEnemy, 30);
                            
                            if (e.hp <= 0) {
                                scene.remove(e.mesh);
                                enemies.splice(j, 1);
                                handleEnemyDeath(e.mesh);
                            }
                        }
                    }
                    
                    if (boss && player.position.distanceTo(boss.position) < 60) {
                        bossHealth -= stompDamage;
                        if (bossHealth <= 0) {
                            scene.remove(boss);
                            boss = null;
                            score += 5000;
                            gainExp(500);
                            showMessage("GORILLA KING DEFEATED!", 4000, "gold");
                            for(let k=0; k<3; k++) dropFruit(new THREE.Vector3(1200 + k*20, 0, 0), true);
                        }
                    }
                } else if (playerState.currentFruit === 'quake' && key === 'c') {
                    // Quake Shockwave
                    if (!playerState.onGround) return;
                    showMessage("QUAKE TSUNAMI!", 1000, "#ffffff");
                    
                    const shockGeo = new THREE.RingGeometry(10, 80, 32);
                    const shockMat = new THREE.MeshBasicMaterial({ color: 0xffffff, side: THREE.DoubleSide, transparent: true, opacity: 0.6 });
                    const shockMesh = new THREE.Mesh(shockGeo, shockMat);
                    shockMesh.rotation.x = -Math.PI / 2;
                    shockMesh.position.copy(player.position);
                    shockMesh.position.y -= 8;
                    scene.add(shockMesh);
                    
                    setTimeout(() => { scene.remove(shockMesh); }, 400);
                    
                    const damageMult = 1 + (statBlox - 1) * 0.1;
                    const quakeDamage = 500 * damageMult;
                    
                    for (let j = enemies.length - 1; j >= 0; j--) {
                        const e = enemies[j];
                        if (player.position.distanceTo(e.mesh.position) < 85) {
                            e.hp -= quakeDamage;
                            const toEnemy = new THREE.Vector3().copy(e.mesh.position).sub(player.position).normalize();
                            e.mesh.position.addScaledVector(toEnemy, 50); // Huge knockback
                            if (e.hp <= 0) {
                                scene.remove(e.mesh);
                                enemies.splice(j, 1);
                                handleEnemyDeath(e.mesh);
                            }
                        }
                    }
                    if (boss && player.position.distanceTo(boss.position) < 100) {
                        bossHealth -= quakeDamage;
                        if (bossHealth <= 0) {
                            scene.remove(boss); boss = null; score += 5000; gainExp(500); showMessage("GORILLA KING DEFEATED!", 4000, "gold");
                            for(let k=0; k<3; k++) dropFruit(new THREE.Vector3(1200 + k*20, 0, 0), true);
                        }
                    }
                } else if (playerState.currentFruit === 'rubber') {
                    // Stretchy punch
                    showMessage("GUM GUM PISTOL!", 1000, "#ffaaaa");
                    const armGeo = new THREE.BoxGeometry(5, 5, 80);
                    const armMat = new THREE.MeshLambertMaterial({ color: 0xffe0bd });
                    const armMesh = new THREE.Mesh(armGeo, armMat);
                    
                    const forward = new THREE.Vector3(0, 0, -1).applyQuaternion(player.quaternion);
                    armMesh.position.copy(player.position).addScaledVector(forward, 40);
                    armMesh.position.y += 10;
                    armMesh.quaternion.copy(player.quaternion);
                    scene.add(armMesh);
                    
                    setTimeout(() => { scene.remove(armMesh); }, 200);
                    
                    const damageMult = 1 + (statBlox - 1) * 0.1;
                    const punchDamage = 250 * damageMult;
                    
                    for (let j = enemies.length - 1; j >= 0; j--) {
                        const e = enemies[j];
                        if (player.position.distanceTo(e.mesh.position) < 85) {
                            const toEnemy = new THREE.Vector3().copy(e.mesh.position).sub(player.position).normalize();
                            if (forward.dot(toEnemy) > 0.8) {
                                e.hp -= punchDamage;
                                e.mesh.position.addScaledVector(forward, 20);
                                if (e.hp <= 0) {
                                    scene.remove(e.mesh);
                                    enemies.splice(j, 1);
                                    handleEnemyDeath(e.mesh);
                                }
                            }
                        }
                    }
                    if (boss && player.position.distanceTo(boss.position) < 100) {
                        const toBoss = new THREE.Vector3().copy(boss.position).sub(player.position).normalize();
                        if (forward.dot(toBoss) > 0.8) {
                            bossHealth -= punchDamage;
                            if (bossHealth <= 0) {
                                scene.remove(boss); boss = null; score += 5000; gainExp(500); showMessage("GORILLA KING DEFEATED!", 4000, "gold");
                                for(let k=0; k<3; k++) dropFruit(new THREE.Vector3(1200 + k*20, 0, 0), true);
                            }
                        }
                    }
                } else {
                    shootAttack(2); // Bigger attack
                }
            }
            if (key === 'b') {
                if (typeof boatDealer !== 'undefined' && player.position.distanceTo(boatDealer.position) < 80) {
                    if (score >= 500) {
                        score -= 500;
                        showMessage("Bought Boat!", 2000, "lime");
                        const bGroup = new THREE.Group();
                        bGroup.position.set(player.position.x + 80, -48, player.position.z + 80); // On water
                        
                        const bGeo = new THREE.BoxGeometry(80, 20, 160);
                        const bMat = new THREE.MeshLambertMaterial({ color: 0x8B4513 });
                        const hull = new THREE.Mesh(bGeo, bMat);
                        bGroup.add(hull);
                        
                        const sGeo = new THREE.BoxGeometry(20, 10, 20);
                        const sMat = new THREE.MeshLambertMaterial({ color: 0x444444 });
                        const seat = new THREE.Mesh(sGeo, sMat);
                        seat.position.set(0, 15, -40); // Seat at back of boat
                        bGroup.add(seat);

                        scene.add(bGroup);
                        if (typeof boats !== 'undefined') boats.push(bGroup);
                    } else {
                        showMessage("Not enough Beli!", 2000, "red");
                    }
                }
            }
            if (key === 'e') {
                if (typeof questGiver !== 'undefined' && questGiver && player.position.distanceTo(questGiver.position) < 80) {
                    if (currentQuest === 'bandits') {
                        if (questProgress >= questTarget) {
                            // Turn in quest
                            currentQuest = null;
                            questProgress = 0;
                            questTarget = 0;
                            score += 1000;
                            gainExp(200);
                            showMessage("Quest Completed! (+1000 Beli, +200 EXP)", 3000, "lime");
                        } else {
                            showMessage("You haven't finished the quest yet!", 2000, "red");
                        }
                    } else {
                        // Give quest
                        currentQuest = 'bandits';
                        questProgress = 0;
                        questTarget = 5;
                        showMessage("Quest Accepted: Defeat 5 Bandits!", 3000, "yellow");
                    }
                } else if (playerState.mountedBoat) {
                    playerState.mountedBoat = null; // Dismount
                    playerState.velocity.y = 50; // Jump off
                } else {
                    if (typeof boats !== 'undefined') {
                        for (let b of boats) {
                            if (player.position.distanceTo(b.position) < 40) {
                                playerState.mountedBoat = b;
                                break;
                            }
                        }
                    }
                }
            }
        });

        // Mouse rotation
        let isPointerLocked = false;
        document.body.addEventListener('click', () => {
            if (!isPointerLocked) {
                document.body.requestPointerLock();
            } else {
                shootAttack(playerState.isTransformed ? 2 : 1);
            }
        });
        document.addEventListener('pointerlockchange', () => {
            isPointerLocked = document.pointerLockElement === document.body;
        });
        document.addEventListener('mousemove', e => {
            if (isPointerLocked) {
                player.rotation.y -= e.movementX * 0.002;
                // Don't rotate camera pitch for this simple clone to keep it easy, or just a little bit
                cameraPivot.rotation.x -= e.movementY * 0.002;
                cameraPivot.rotation.x = Math.max(-Math.PI/4, Math.min(Math.PI/4, cameraPivot.rotation.x));
            }
        });

        // --- Game Entities ---
        const enemies = [];
        const projectiles = [];
        const fruits = [];
        let boss = null;

        function spawnEnemy(pos, type = 'bandit') {
            const eGroup = new THREE.Group();
            eGroup.position.copy(pos);
            let sprMat = mats.bandit;
            let hp = 50;
            let speed = 20;
            if (type === 'desert') {
                sprMat = mats.desertBandit;
                hp = 150;
                speed = 25;
            } else if (type === 'snow') {
                sprMat = mats.snowman;
                hp = 300;
                speed = 15;
            }
            const spr = new THREE.Sprite(sprMat);
            spr.scale.set(15, 15, 1);
            spr.position.y = 8;
            eGroup.add(spr);
            eGroup.userData = { home: pos.clone() };
            scene.add(eGroup);
            enemies.push({ mesh: eGroup, hp: hp, speed: speed, type: type });
        }

        function spawnBoss() {
            boss = new THREE.Group();
            boss.position.set(1200, 0, 0); // On Boss Island
            const spr = new THREE.Sprite(mats.boss);
            spr.scale.set(50, 50, 1); // Huge
            spr.position.y = 25;
            boss.add(spr);
            scene.add(boss);
        }

        function handleEnemyDeath(eMesh) {
            score += 100;
            gainExp(25);
            dropFruit(eMesh.position);
            
            if (currentQuest === 'bandits') {
                questProgress++;
                if (questProgress >= questTarget) {
                    showMessage("Quest Objective Complete! Return to Quest Giver.", 3000, "lime");
                } else {
                    showMessage(`Bandits: ${questProgress}/${questTarget}`, 1000, "yellow");
                }
            }

            let spawnPos = new THREE.Vector3(player.position.x + (Math.random()-0.5)*200, 10, player.position.z + (Math.random()-0.5)*200);
            
            // Try to keep enemies near their island origin if killed
            if (eMesh.userData && eMesh.userData.home) {
                spawnPos = new THREE.Vector3(eMesh.userData.home.x + (Math.random()-0.5)*100, 10, eMesh.userData.home.z + (Math.random()-0.5)*100);
            }

            // Figure out type based on home region or just spawn a regular bandit near player as fallback
            let respawnType = 'bandit';
            if (spawnPos.x < -400) respawnType = 'desert';
            if (spawnPos.x > 400 && spawnPos.z > 400) respawnType = 'snow';

            setTimeout(() => {
                spawnEnemy(spawnPos, respawnType);
            }, 2000);
        }

        // Spawn initial enemies
        spawnEnemy(new THREE.Vector3(100, 0, 50), 'bandit');
        spawnEnemy(new THREE.Vector3(-800, 0, -800), 'desert');
        spawnEnemy(new THREE.Vector3(800, 0, 800), 'snow');
        spawnBoss();

        function shootAttack(scaleMultiplier = 1) {
            let isDragon = false;
            if (playerState.isTransformed && playerState.currentFruit === 'dragon') {
                scaleMultiplier = 5; // Massive fireball
                isDragon = true;
            }
            
            const geo = isDragon ? new THREE.SphereGeometry(3 * scaleMultiplier, 8, 8) : new THREE.BoxGeometry(5 * scaleMultiplier, 5 * scaleMultiplier, 5 * scaleMultiplier);
            const mat = new THREE.MeshBasicMaterial({ color: playerState.isTransformed ? playerState.fruitColor : 0xffffff });
            const p = new THREE.Mesh(geo, mat);
            
            // Start at player, move forward
            p.position.copy(player.position);
            p.position.y += 10;
            
            // Direction based on camera/player rotation
            const dir = new THREE.Vector3(0, 0, -1).applyQuaternion(player.quaternion);
            
            scene.add(p);
            
            // Damage scaling
            const damageMult = playerState.isTransformed ? (1 + (statBlox - 1) * 0.1) : (1 + (statMelee - 1) * 0.1);
            const baseDamage = playerState.isTransformed ? 200 : 100;
            const finalDamage = isDragon ? baseDamage * 2 * damageMult : baseDamage * damageMult;
            
            projectiles.push({ mesh: p, dir: dir, speed: isDragon ? 150 : 200, life: 1.0, damage: finalDamage });
        }

        function dropFruit(pos, isBoss = false) {
            const fruitList = ["rocket", "spin", "flame", "dragon", "tiger", "kitsune", "yeti", "mammoth", "t-rex", "phoenix", "eagle", "venom", "gas", "ice", "buddha", "light", "rubber", "quake"];
            const type = fruitList[Math.floor(Math.random() * fruitList.length)];
            
            // Random color
            const color = new THREE.Color(Math.random(), Math.random(), Math.random());
            
            const geo = new THREE.BoxGeometry(8, 8, 8);
            const mat = new THREE.MeshLambertMaterial({ color: color });
            const f = new THREE.Mesh(geo, mat);
            f.position.copy(pos);
            f.position.y += 5;
            
            scene.add(f);
            fruits.push({ mesh: f, type: type, color: color });
        }

        function die() {
            playerHealth = playerMaxHealth;
            score = Math.floor(score / 2); // Lose half beli on death
            player.position.set(0, 50, 0);
            playerState.velocity.set(0,0,0);
            showMessage("YOU DIED!", 3000, "red");
            updateUI();
        }

        function gainExp(amount) {
            playerExp += amount;
            while (playerExp >= playerMaxExp) {
                playerExp -= playerMaxExp;
                playerLevel++;
                playerMaxExp = Math.floor(playerMaxExp * 1.5);
                statPoints += 3;
                playerHealth = playerMaxHealth; // Heal on level up
                showMessage("LEVEL UP! +3 Stat Points", 3000, "#00ffff");
            }
        }

        // --- Physics & Update Loop ---
        const clock = new THREE.Clock();

        function checkCollision(pos, radius) {
            // Very simple AABB with islands
            for (let c of colliders) {
                const box = new THREE.Box3().setFromObject(c);
                if (pos.x > box.min.x && pos.x < box.max.x &&
                    pos.z > box.min.z && pos.z < box.max.z &&
                    pos.y >= box.min.y && pos.y <= box.max.y + radius) {
                    return box.max.y; // Return ground height
                }
            }
            // Water walking collision
            const waterWalkers = ['yeti', 'ice', 'kitsune', 'buddha'];
            if (playerState.currentFruit && waterWalkers.includes(playerState.currentFruit)) {
                if (pos.y <= -48 + radius && pos.y >= -100) {
                    return -48; // Water level
                }
            }
            return null;
        }

        function animate() {
            requestAnimationFrame(animate);
            const dt = clock.getDelta();

            // Player Movement Logic
            const dir = new THREE.Vector3();
            if (keys['w']) dir.z -= 1;
            if (keys['s']) dir.z += 1;
            if (keys['a']) dir.x -= 1;
            if (keys['d']) dir.x += 1;
            
            dir.normalize();
            dir.applyQuaternion(player.quaternion); // Move relative to where we're looking
            
            if (playerState.mountedBoat) {
                // Drive boat
                playerState.mountedBoat.position.addScaledVector(dir, 150 * dt);
                
                // Rotate boat to face direction of movement
                if (dir.lengthSq() > 0.01) {
                    const targetQuat = new THREE.Quaternion().setFromUnitVectors(new THREE.Vector3(0, 0, -1), dir.clone().normalize());
                    playerState.mountedBoat.quaternion.slerp(targetQuat, 0.1);
                }

                // Lock player to boat seat
                const offset = new THREE.Vector3(0, 20, -40).applyQuaternion(playerState.mountedBoat.quaternion);
                player.position.copy(playerState.mountedBoat.position).add(offset);
                playerState.velocity.set(0, 0, 0);
            } else {
                if (!playerState.isDashing) {
                    player.position.addScaledVector(dir, playerState.speed * dt);
                } else {
                    player.position.addScaledVector(playerState.velocity, dt); // Dash velocity
                    playerState.velocity.lerp(new THREE.Vector3(0, playerState.velocity.y, 0), 0.1); // friction on XZ
                }

                // Gravity
                playerState.velocity.y -= 300 * dt; // Gravity
                player.position.y += playerState.velocity.y * dt;

                // Floor collision
                const floorY = checkCollision(player.position, 1);
                if (floorY !== null && playerState.velocity.y <= 0) {
                    player.position.y = floorY;
                    playerState.velocity.y = 0;
                    playerState.onGround = true;
                }
            }

            // Ocean death
            const waterWalkers = ['yeti', 'ice', 'kitsune', 'buddha'];
            const canWalkOnWater = playerState.currentFruit && waterWalkers.includes(playerState.currentFruit);
            
            if (player.position.y < -40 && !canWalkOnWater) {
                die();
            } else if (player.position.y < -100) {
                // Fallback death
                die();
            }

            // Projectiles update
            for (let i = projectiles.length - 1; i >= 0; i--) {
                const p = projectiles[i];
                p.mesh.position.addScaledVector(p.dir, p.speed * dt);
                p.life -= dt;
                
                let hit = false;
                
                // Hit Boss
                if (boss && p.mesh.position.distanceTo(boss.position) < 30) {
                    bossHealth -= p.damage;
                    hit = true;
                    if (bossHealth <= 0) {
                        scene.remove(boss);
                        boss = null;
                        score += 5000;
                        gainExp(500);
                        showMessage("GORILLA KING DEFEATED!", 4000, "gold");
                        // Drop 3 fruits
                        for(let k=0; k<3; k++) dropFruit(new THREE.Vector3(1200 + k*20, 0, 0), true);
                    }
                }

                // Hit Enemies
                for (let j = enemies.length - 1; j >= 0; j--) {
                    const e = enemies[j];
                    if (p.mesh.position.distanceTo(e.mesh.position) < 15) {
                        e.hp -= p.damage;
                        hit = true;
                        if (e.hp <= 0) {
                            scene.remove(e.mesh);
                            enemies.splice(j, 1);
                            handleEnemyDeath(e.mesh);
                        }
                    }
                }

                if (hit || p.life <= 0) {
                    scene.remove(p.mesh);
                    projectiles.splice(i, 1);
                }
            }

            // Enemies Update (Move towards player)
            enemies.forEach(e => {
                if (e.mesh.position.distanceTo(player.position) < 400) {
                    const toPlayer = new THREE.Vector3().copy(player.position).sub(e.mesh.position);
                    toPlayer.y = 0;
                    toPlayer.normalize();
                    e.mesh.position.addScaledVector(toPlayer, e.speed * dt);
                    
                    // Damage player
                    if (e.mesh.position.distanceTo(player.position) < 10) {
                        playerHealth -= 50;
                        e.mesh.position.sub(toPlayer.multiplyScalar(20)); // Knockback enemy
                        if (playerHealth <= 0) die();
                    }
                }
            });

            // Boss Update
            if (boss && boss.position.distanceTo(player.position) < 600) {
                const toPlayer = new THREE.Vector3().copy(player.position).sub(boss.position);
                toPlayer.y = 0;
                toPlayer.normalize();
                boss.position.addScaledVector(toPlayer, 30 * dt);
                
                if (boss.position.distanceTo(player.position) < 30) {
                    playerHealth -= 150;
                    player.position.addScaledVector(toPlayer, 50); // Knockback player
                    if (playerHealth <= 0) die();
                }
            }

            // Collect Fruits
            for (let i = fruits.length - 1; i >= 0; i--) {
                const f = fruits[i];
                f.mesh.rotation.y += 2 * dt; // Spin fruit
                if (player.position.distanceTo(f.mesh.position) < 15) {
                    playerState.currentFruit = f.type;
                    playerState.fruitColor = f.color;
                    showMessage(`Got ${f.type.toUpperCase()} Fruit!`, 2000, "#" + f.color.getHexString());
                    scene.remove(f.mesh);
                    fruits.splice(i, 1);
                }
            }

            updateUI();
            renderer.render(scene, camera);
        }

        // Handle resize
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        animate();
    </script>
</body>
</html>
